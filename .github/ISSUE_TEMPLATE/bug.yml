name: Bug
description: Something is broken
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - epic:platform
        - epic:groups
        - epic:dream-planner
        - epic:calendar
        - epic:organizer
        - epic:summary
