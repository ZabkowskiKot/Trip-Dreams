name: Feature
description: A new feature or user story (PBI)
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: epic
    attributes:
      label: Epic
      options:
        - epic:groups
        - epic:dream-planner
        - epic:calendar
        - epic:organizer
        - epic:summary
        - epic:platform
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority:high
        - priority:medium
        - priority:low
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the user be able to do?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of done conditions
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true
